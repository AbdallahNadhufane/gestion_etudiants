<!DOCTYPE html>
<html>
<head>
    <title>Liste des étudiants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>📋 Liste des Étudiants</h3>

        <a href="/ajouter/" class="btn btn-success">
            ➕ Ajouter
        </a>
    </div>

    <table class="table table-bordered table-striped shadow-sm">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Sexe</th>
                <th>Téléphone</th>
                <th>Email</th>
                <th>Adresse</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for e in etudiants %}
            <tr>
                <td>{{ e.id }}</td>
                <td>{{ e.nom }}</td>
                <td>{{ e.prenom }}</td>
                <td>{{ e.sexe }}</td>
                <td>{{ e.telephone }}</td>
                <td>{{ e.email }}</td>
                <td>{{ e.adresse }}</td>

                <td>
                    <a href="/modifier/{{ e.id }}/" class="btn btn-warning btn-sm">
                        ✏️ Modifier
                    </a>

                    <a href="/supprimer/{{ e.id }}/" class="btn btn-danger btn-sm"
                       onclick="return confirm('Supprimer cet étudiant ?')">
                        🗑️ Supprimer
                    </a>
                </td>

            </tr>
            {% empty %}
            <tr>
                <td colspan="8" class="text-center">
                    Aucun étudiant enregistré
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
